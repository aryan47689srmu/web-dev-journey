<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /*Element Selector*/
        div {
            /* background-color: red; */
        }

        /* Class Selector */
        .red {
            background-color: red;
        }

        /* ID Selector */
        #green {
            background-color: green;
        }

        /* Child Selector */
        div>p {
            color: blue;
            background-color: brown;
        }

        /* Decendent Selector */
        div p {
            color: blue;
            background-color: brown;
        }

        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* Psuedo Selector */
        a:visited {
            color: yellow;
        }

        a:link {
            color: green;
        }

        a:active {
            background-color: red;
        }

        a:hover {
            background-color: black;
        }
    </style>
</head>

<body>
    <div class="red">
        I am a div
        <p> I am a inside div by using Child Selector </p>
    </div>

    <div id="green">
        i am another div
    </div>
    <div>
        <div class="red">
            <article>
                <p> I am a inside div by using Decendent Selector </p>
            </article>
        </div>
        <a href="https://www.google.com"> Go to Google</a>

        <a href="https://www.instagram.com"> Go to Instagram</a>
    </div>
</body>

</html>
