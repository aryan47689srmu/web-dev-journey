<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Postion Property</title>
    <style>
        .box {
            height: 233px;
            width: 80vw;
            border: 2px solid black;
            margin: 3px;
            padding: 3px;
        }

        * {
            margin: 0;
            padding: 0;
        }

        .box1 {
            background-color: aqua;
            /* position: sticky; */
            position: absolute;
            top: 0px;
            left: 0px;
            /* height: 111px;
            width: 100%;
            margin: 0;
            padding: 0; */
        }

        .box2 {
            background-color: azure;
            /* position: relative;
            top: 34px;
            left: 56px; */
        }

        .box3 {
            background-color: aquamarine;
            /* position: fixed;
            left: 9vw;
            bottom: 0; 
            height: 111px; */
        }

        .box4 {
            background-color: blueviolet;
        }


        .parent {
            /*Exception: transform, filter, or perspective properties can also make an element appear as positioned  */
            margin: 34px;
            padding: 43px;
            border: 2px solid blue;
            /* position: relative; */
            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>

</body>

</html>
