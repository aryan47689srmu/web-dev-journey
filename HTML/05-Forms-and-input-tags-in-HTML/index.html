<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets Learn it</title>
</head>

<body>
    <h3>Form to apply For Web Development Cource - TA</h3>
    <form action="post">
        <div>
            <label for="username">Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autofocus>
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <labels for="male">Male</labels>
            <input type="radio" id="female" name="gender" value="Female">
            <labels for="female">Female</labels>
        </div>

        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes" <labels for="subscribe">Subscribe to
            newsletter</labels>
        </div>
        <div>
            <label for="comment">Enter your comment here...</label>
            <br>
            <textarea id="comment" name="comment" rows="4" cols="50">Enter your comment here...</textarea>
        </div>
        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
            </select>
        </div>
    </form>
</body>

</html>
